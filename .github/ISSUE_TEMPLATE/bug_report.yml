name: Bug report
description: Report a problem with z4j-taskiq
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in `z4j-taskiq`.

        **Security bugs do NOT belong here.** If you believe you've
        found a security issue, please email `security@z4j.com` -
        see [SECURITY.md](../blob/main/SECURITY.md).

  - type: input
    id: package-version
    attributes:
      label: z4j-taskiq version
      description: Output of `pip show z4j-taskiq | grep -E 'Name|Version'`
      placeholder: z4j-taskiq 1.0.0
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: 3.14.4
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Affected module
      description: (Customize this dropdown's options per package.)
      options:
        - Unsure / multiple
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A standalone script is ideal.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full traceback if applicable. Please redact secrets.
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: This is NOT a security issue (those go to security@z4j.com)
          required: true
